version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MONGO_URI=mongodb://mongodb:27017/lms
      - JWT_SECRET=dev_secret
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./media:/media
      - C:/:/media/c

    command: npm run dev
    depends_on:
      - mongodb

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000/api
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  mongo-data:
